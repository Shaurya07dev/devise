<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devise</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
          </svg>
        </div>
        <span class="brand-name">Devise</span>
      </div>
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text">Active</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat">
          <span class="stat-value" id="eventCount">0</span>
          <span class="stat-label">Events</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="threatCount">0</span>
          <span class="stat-label">Threats</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="riskScore">—</span>
          <span class="stat-label">Risk</span>
        </div>
      </div>

      <!-- AI Tools Section -->
      <section class="section">
        <div class="section-header">
          <span class="section-title">AI Tools Detected</span>
          <span class="section-count" id="toolCount">0</span>
        </div>
        <div class="tools-list" id="toolsList">
          <div class="empty-state">
            <span class="empty-icon">◎</span>
            <span class="empty-text">No AI tools detected</span>
          </div>
        </div>
      </section>

      <!-- Recent Activity -->
      <section class="section">
        <div class="section-header">
          <span class="section-title">Recent Activity</span>
        </div>
        <div class="activity-list" id="activityList">
          <div class="empty-state">
            <span class="empty-icon">◎</span>
            <span class="empty-text">No activity yet</span>
          </div>
        </div>
      </section>

      <!-- Security Status -->
      <section class="security-section">
        <div class="security-grid">
          <div class="security-item">
            <span class="security-icon" id="encryptionIcon">✓</span>
            <span class="security-label">Encryption</span>
          </div>
          <div class="security-item">
            <span class="security-icon" id="policyIcon">✓</span>
            <span class="security-label">Policy</span>
          </div>
          <div class="security-item">
            <span class="security-icon" id="syncIcon">✓</span>
            <span class="security-label">Sync</span>
          </div>
        </div>
      </section>
    </main>

    <!-- Actions -->
    <footer class="footer">
      <button class="btn btn-ghost" id="syncBtn" title="Sync">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <button class="btn btn-primary" id="dashboardBtn">
        <span>Open Dashboard</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
      <button class="btn btn-ghost" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </footer>

    <!-- Identity Bar -->
    <div class="identity-bar" id="identityBar">
      <div class="identity-avatar" id="identityAvatar">?</div>
      <div class="identity-info">
        <span class="identity-name" id="identityName">Not configured</span>
        <span class="identity-email" id="identityEmail">Set up identity</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
